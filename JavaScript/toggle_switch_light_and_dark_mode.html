<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Switch : Light And Dark Mode</title>
    <style type="text/css">
        div
        {
            height: 250px;
            width: 250px;
        }
        #dark
        {
            background-color: black;
        }
        #light
        {
            background-color: white;
        }
    </style>
</head>
<body>
    
    <div id="light">
    <label for=cb1></label>
    <input id=cb1 type=checkbox>

    <script>
        
            let checkbox = document.getElementById("cb1");

            checkbox.addEventListener("change", () => {

                if(checkbox.checked)
                {
                    // text.innerHTML = "Checkbox is checked"
                    // ID = "dark";
                    // document.write("<div id="+ID+">"+"</div>");
                    document.write("<div id=dark>Dark Mode ON</div>");
                    
                }
                else
                {
                    // text.innerHTML = "Checkbox is not checked"
                    // ID = "light";
                    // document.write("<div id="+ID+">"+"</div>");
                    document.write("<div id=light>Light Mode ON</div>");
                }

            });
        </script>
    </div>
</body>
</html>
